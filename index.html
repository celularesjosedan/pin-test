<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Control de PINES · Neon Dark</title>
    <style>
        /* Reset y base oscura */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #0b0f1a;
            color: #e0e8f0;
            padding: 1.5rem;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 1300px;
            width: 100%;
            background: #141a26;
            border-radius: 1.8rem;
            padding: 2rem 2rem 2.5rem;
            border: 1px solid #2a3344;
        }
        h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
            color: #f0f4ff;
        }
        h1 span {
            background: #1f2a3a;
            color: #00f0c0;
            font-size: 1rem;
            font-weight: 600;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            border: 1px solid #00f0c0;
            box-shadow: 0 0 8px rgba(0, 240, 192, 0.2);
        }
        .subtitle {
            color: #a0b4cc;
            margin-top: 0.3rem;
            margin-bottom: 2rem;
            font-size: 1.05rem;
            border-left: 4px solid #00d4ff;
            padding-left: 1rem;
            background: linear-gradient(90deg, rgba(0,212,255,0.08) 0%, transparent 80%);
        }
        .stats-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem 2.5rem;
            background: #10161f;
            padding: 1.2rem 1.8rem;
            border-radius: 1.2rem;
            margin-bottom: 2.2rem;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #2a3344;
        }
        .stats {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }
        .stat-item {
            display: flex;
            align-items: baseline;
            gap: 0.4rem;
        }
        .stat-item .label {
            font-weight: 500;
            color: #8899bb;
        }
        .stat-item .value {
            font-weight: 700;
            font-size: 1.4rem;
            color: #f0f4ff;
        }
        .stat-item .value.pending { color: #ff6b6b; }
        .stat-item .value.tested { color: #00f0a0; }
        .btn-reset {
            background: #2a1f2f;
            color: #ff7b9c;
            border: 1px solid #ff7b9c;
            padding: 0.5rem 1.6rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.1s, color 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            box-shadow: 0 0 12px rgba(255, 123, 156, 0.15);
        }
        .btn-reset:hover {
            background: #ff7b9c;
            color: #141a26;
        }

        .section-title {
            font-size: 1.6rem;
            font-weight: 600;
            margin: 2rem 0 1rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            color: #d0dcf0;
        }
        .section-title .badge {
            background: #1f2a3a;
            padding: 0.1rem 1rem;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #00d4ff;
            border: 1px solid #00d4ff;
            box-shadow: 0 0 8px rgba(0, 212, 255, 0.15);
        }

        /* Grid de PINs */
        .pin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 0.8rem;
            margin-bottom: 0.8rem;
        }

        .pin-card {
            background: #1a2230;
            border: 2px solid #2a3346;
            border-radius: 1rem;
            padding: 0.6rem 0.2rem;
            text-align: center;
            cursor: pointer;
            user-select: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80px;
            transition: background 0.1s, border-color 0.1s, opacity 0.1s;
            position: relative;
        }
        /* PIN code: blanco brillante */
        .pin-card .pin-code {
            font-size: 1.3rem;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            letter-spacing: 0.5px;
            line-height: 1.4;
            color: #ffffff; /* blanco puro */
            text-shadow: 0 0 6px rgba(255,255,255,0.2);
        }
        /* Probabilidad: verde neón */
        .pin-card .probability {
            font-size: 0.7rem;
            color: #00ffaa; /* verde neón */
            background: #0f1620;
            padding: 0.1rem 0.5rem;
            border-radius: 20px;
            margin-top: 0.2rem;
            font-weight: 600;
            border: 1px solid #00ffaa;
            box-shadow: 0 0 12px rgba(0, 255, 170, 0.2);
            text-shadow: 0 0 6px rgba(0,255,170,0.4);
        }
        .pin-card:hover:not(.tested) {
            background: #1f2a3a;
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.15);
        }
        /* PINs probados */
        .pin-card.tested {
            background: #111822;
            border-color: #2a3344;
            opacity: 0.6;
            cursor: default;
        }
        .pin-card.tested .pin-code {
            text-decoration: line-through;
            text-decoration-color: #667;
            text-decoration-thickness: 2px;
            color: #8899bb; /* gris azulado para los tachados */
            text-shadow: none;
        }
        .pin-card.tested .probability {
            background: #0a0f16;
            color: #445566;
            border-color: #2a3344;
            box-shadow: none;
            text-shadow: none;
        }
        .pin-card.tested::after {
            content: "✓";
            position: absolute;
            top: 4px;
            right: 8px;
            font-size: 1.2rem;
            color: #00f0a0;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(0, 240, 160, 0.3);
        }

        .footer {
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid #2a3344;
            font-size: 0.85rem;
            color: #668;
            text-align: center;
        }
        .footer a {
            color: #00d4ff;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
            color: #00f0c0;
        }

        @media (max-width: 640px) {
            .container { padding: 1.2rem; }
            h1 { font-size: 1.8rem; }
            .stats-grid { flex-direction: column; align-items: stretch; gap: 0.8rem; }
            .stats { justify-content: space-between; }
            .pin-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); }
            .pin-card { min-height: 70px; padding: 0.4rem 0.1rem; }
            .pin-card .pin-code { font-size: 1rem; }
        }
        @media (max-width: 400px) {
            .pin-grid { grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <header>
        <h1>
            🔐 Control de PINES
            <span>Top + Probabilidad</span>
        </h1>
        <div class="subtitle">
            Marca los PINs ya probados. Probabilidad de éxito basada en frecuencia real.
        </div>
    </header>

    <div class="stats-grid">
        <div class="stats">
            <div class="stat-item"><span class="label">📌 Pendientes:</span><span class="value pending" id="pendingCount">0</span></div>
            <div class="stat-item"><span class="label">✅ Probados:</span><span class="value tested" id="testedCount">0</span></div>
            <div class="stat-item"><span class="label">📊 Total:</span><span class="value" id="totalCount">0</span></div>
        </div>
        <button class="btn-reset" id="resetBtn">⟳ Reiniciar todo</button>
    </div>

    <!-- Sección 4 dígitos -->
    <div class="section-title">
        <span>4 Dígitos</span>
        <span class="badge" id="badge4">0 pendientes</span>
    </div>
    <div class="pin-grid" id="grid4"></div>

    <!-- Sección 6 dígitos -->
    <div class="section-title">
        <span>6 Dígitos</span>
        <span class="badge" id="badge6">0 pendientes</span>
    </div>
    <div class="pin-grid" id="grid6"></div>

    <div class="footer">
        Datos reales · Probabilidad por ranking · <span style="color:#00d4ff;">Neon Dark</span>
        <br /><span style="opacity:0.5;">v2.0 — GitHub</span>
    </div>
</div>

<script>
    (function() {
        'use strict';

        const PIN_4 = [
            '1234','0000','2580','1111','5555','5683','0852','2222','1212','1998',
            '6969','1122','1313','2001','1010','7777','9999','3333','4444','6666',
            '1818','1984','1112','1004','2000','2013','2020','1230','1235','4321',
            '1020','1123','1221','2112','1515','1414','1616','1717','1820','1919',
            '3003','4004','5005','6006','7007','8008','9009','0101','0202','0303'
        ];
        const PIN_6 = [
            '123456','000000','111111','123123','654321','121212','222222','333333',
            '444444','555555','666666','777777','888888','999999','112233','123321',
            '111222','222111','123789','987654','111112','000001','100000','123450',
            '101010','010101','121314','141414','151515','161616','171717','181818',
            '191919','202020','212121','232323','242424','252525','262626','272727',
            '282828','292929','303030','313131','323232','333666','444111','555000',
            '666333','777000'
        ];

        function computeProbabilities(list) {
            const n = list.length;
            const weights = list.map((_, i) => 1 / Math.pow(i + 1, 0.8));
            const sum = weights.reduce((a, b) => a + b, 0);
            return weights.map(w => (w / sum) * 100);
        }

        const probs4 = computeProbabilities(PIN_4);
        const probs6 = computeProbabilities(PIN_6);

        const STORAGE_KEY = 'pinTrackerState';

        function loadState() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try { return JSON.parse(stored); } catch (e) { return null; }
            }
            return null;
        }

        function saveState(state) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function initState() {
            const existing = loadState();
            if (existing && typeof existing === 'object') {
                let modified = false;
                [PIN_4, PIN_6].forEach((list, idx) => {
                    const key = idx === 0 ? '4' : '6';
                    if (!existing[key]) { existing[key] = {}; modified = true; }
                    list.forEach(pin => {
                        if (!(pin in existing[key])) {
                            existing[key][pin] = false;
                            modified = true;
                        }
                    });
                });
                if (modified) saveState(existing);
                return existing;
            } else {
                const fresh = { '4': {}, '6': {} };
                PIN_4.forEach(p => fresh['4'][p] = false);
                PIN_6.forEach(p => fresh['6'][p] = false);
                saveState(fresh);
                return fresh;
            }
        }

        let state = initState();

        function render() {
            renderGrid('4', PIN_4, probs4);
            renderGrid('6', PIN_6, probs6);
            updateStats();
        }

        function renderGrid(digits, list, probs) {
            const container = document.getElementById(digits === '4' ? 'grid4' : 'grid6');
            const badge = document.getElementById(digits === '4' ? 'badge4' : 'badge6');
            if (!container) return;

            const pinState = state[digits] || {};
            let pending = 0;
            list.forEach(pin => { if (!pinState[pin]) pending++; });
            badge.textContent = pending + ' pendientes';

            let html = '';
            list.forEach((pin, index) => {
                const tested = pinState[pin] || false;
                const prob = probs[index];
                const probStr = prob.toFixed(2) + '%';
                const classes = 'pin-card' + (tested ? ' tested' : '');
                html += `<div class="${classes}" data-digits="${digits}" data-pin="${pin}">
                            <div class="pin-code">${pin}</div>
                            <div class="probability">${probStr}</div>
                        </div>`;
            });
            container.innerHTML = html;

            container.querySelectorAll('.pin-card').forEach(card => {
                card.addEventListener('click', function(e) {
                    const digitsAttr = this.dataset.digits;
                    const pin = this.dataset.pin;
                    togglePin(digitsAttr, pin);
                });
            });
        }

        function togglePin(digits, pin) {
            state[digits][pin] = !state[digits][pin];
            saveState(state);
            render();
        }

        function updateStats() {
            const total4 = PIN_4.length, total6 = PIN_6.length;
            const total = total4 + total6;
            let tested4 = 0, tested6 = 0;
            PIN_4.forEach(p => { if (state['4'][p]) tested4++; });
            PIN_6.forEach(p => { if (state['6'][p]) tested6++; });
            const testedTotal = tested4 + tested6;
            const pendingTotal = total - testedTotal;

            document.getElementById('pendingCount').textContent = pendingTotal;
            document.getElementById('testedCount').textContent = testedTotal;
            document.getElementById('totalCount').textContent = total;
        }

        function resetAll() {
            if (!confirm('¿Marcar todos los PINs como NO probados?')) return;
            PIN_4.forEach(p => state['4'][p] = false);
            PIN_6.forEach(p => state['6'][p] = false);
            saveState(state);
            render();
        }

        document.addEventListener('DOMContentLoaded', function() {
            render();
            document.getElementById('resetBtn').addEventListener('click', resetAll);
        });

        window.addEventListener('beforeunload', function() {
            saveState(state);
        });
    })();
</script>
</body>
</html>
