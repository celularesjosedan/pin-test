<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Control de PINES · Probabilidad de éxito</title>
    <style>
        /* Reset & base */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: radial-gradient(circle at top, #12303a 0%, #0b1117 32%, #070b10 100%);
            color: #e6faff;
            padding: 1.5rem;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 1300px;
            width: 100%;
            background: rgba(10, 16, 24, 0.9);
            border-radius: 2rem;
            box-shadow: 0 0 0 1px rgba(34, 211, 238, 0.14), 0 18px 60px rgba(0,0,0,0.48), 0 0 38px rgba(34, 211, 238, 0.08);
            padding: 2rem 2rem 2.5rem;
        }
        h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }
        h1 span {
            background: rgba(34, 211, 238, 0.14);
            color: #67e8f9;
            font-size: 1rem;
            font-weight: 600;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
        }
        .subtitle {
            color: #9fb7c3;
            margin-top: 0.3rem;
            margin-bottom: 2rem;
            font-size: 1.05rem;
            border-left: 4px solid #22d3ee;
            padding-left: 1rem;
        }
        .stats-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem 2.5rem;
            background: rgba(8, 14, 22, 0.88);
            padding: 1.2rem 1.8rem;
            border-radius: 1.2rem;
            margin-bottom: 2.2rem;
            align-items: center;
            justify-content: space-between;
        }
        .stats {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }
        .stat-item {
            display: flex;
            align-items: baseline;
            gap: 0.4rem;
        }
        .stat-item .label {
            font-weight: 500;
            color: #c7dbe6;
        }
        .stat-item .value {
            font-weight: 700;
            font-size: 1.4rem;
            color: #ecfeff;
        }
        .stat-item .value.pending { color: #dc2626; }
        .stat-item .value.tested { color: #16a34a; }
        .btn-reset {
            background: rgba(127, 29, 29, 0.22);
            color: #fecaca;
            border: none;
            padding: 0.5rem 1.6rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
        .btn-reset:hover { background: rgba(153, 27, 27, 0.34); transform: scale(1.02); }
        .btn-reset:active { transform: scale(0.97); }

        .section-title {
            font-size: 1.6rem;
            font-weight: 600;
            margin: 2rem 0 1rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .section-title .badge {
            background: rgba(34, 211, 238, 0.12);
            padding: 0.1rem 1rem;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #b6f7ff;
        }

        /* Grid de PINs */
        .pin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 0.8rem;
            margin-bottom: 0.8rem;
        }

        .pin-card {
            background: linear-gradient(180deg, rgba(10,17,26,0.96) 0%, rgba(12,21,32,0.96) 100%);
            border: 1px solid rgba(103, 232, 249, 0.18);
            border-radius: 1rem;
            padding: 0.6rem 0.2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.15s ease;
            user-select: none;
            box-shadow: 0 0 0 1px rgba(34,211,238,0.04), inset 0 0 18px rgba(34,211,238,0.03), 0 8px 24px rgba(0,0,0,0.34);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80px;
        }
        .pin-card .pin-code {
            font-size: 1.3rem;
            font-weight: 700;
            font-family: 'Consolas', 'Courier New', monospace;
            letter-spacing: 0.5px;
            line-height: 1.4;
            color: #dffcff;
            text-shadow: 0 0 10px rgba(103,232,249,.18);
        }
        .pin-card .probability {
            font-size: 0.74rem;
            color: #d7f8ff;
            background: rgba(103, 232, 249, 0.10);
            border: 1px solid rgba(103,232,249,0.14);
            padding: 0.14rem 0.55rem;
            border-radius: 20px;
            margin-top: 0.28rem;
            font-weight: 700;
            transition: 0.2s;
        }
        .pin-card:hover:not(.tested) {
            border-color: rgba(103, 232, 249, 0.72);
            background: linear-gradient(180deg, rgba(13,25,36,1) 0%, rgba(18,34,47,1) 100%);
            transform: translateY(-3px);
            box-shadow: 0 0 0 1px rgba(103,232,249,0.18), 0 0 26px rgba(34,211,238,0.18), 0 14px 28px rgba(0,0,0,0.42);
        }
        .pin-card.tested {
            background: rgba(71, 85, 105, 0.24);
            border-color: rgba(148, 163, 184, 0.18);
            color: #7b93a2;
            cursor: default;
            opacity: 0.62;
            transform: none;
            box-shadow: none;
        }
        .pin-card.tested .pin-code {
            text-decoration: line-through;
            text-decoration-color: #7b93a2;
            text-decoration-thickness: 2px;
        }
        .pin-card.tested .probability {
            background: rgba(34, 211, 238, 0.12);
            color: #7b93a2;
        }
        .pin-card.tested::after {
            content: "✓";
            position: absolute;
            top: 4px;
            right: 8px;
            font-size: 1.2rem;
            color: #67e8f9;
            font-weight: 700;
        }

        .empty-message {
            grid-column: 1 / -1;
            text-align: center;
            color: #7b93a2;
            padding: 2rem 0;
            font-style: italic;
        }

        .footer {
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(103, 232, 249, 0.12);
            font-size: 0.85rem;
            color: #7b93a2;
            text-align: center;
        }
        .footer a {
            color: #67e8f9;
            text-decoration: none;
        }
        .footer a:hover { text-decoration: underline; }

        @media (max-width: 640px) {
            .container { padding: 1.2rem; }
            h1 { font-size: 1.8rem; }
            .stats-grid { flex-direction: column; align-items: stretch; gap: 0.8rem; }
            .stats { justify-content: space-between; }
            .pin-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); }
            .pin-card { min-height: 70px; padding: 0.4rem 0.1rem; }
            .pin-card .pin-code {
            font-size: 1.3rem;
            font-weight: 700;
            font-family: 'Consolas', 'Courier New', monospace;
            letter-spacing: 0.5px;
            line-height: 1.4;
            color: #dffcff;
            text-shadow: 0 0 10px rgba(103,232,249,.18);
        }
        }
        @media (max-width: 400px) {
            .pin-grid { grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); }
        }
    
        .helper-note {
            margin: 1rem 0 0;
            background: #ecfeff;
            border: 1px solid #bae6fd;
            color: #155e75;
            padding: 0.9rem 1rem;
            border-radius: 1rem;
            font-size: 0.95rem;
        }
        .section-desc {
            color: #9fb7c3;
            margin: -0.3rem 0 1rem;
            font-size: 0.95rem;
        }
        .pin-card.priority {
            border-color: rgba(103, 232, 249, 0.95);
            background: linear-gradient(180deg, rgba(8,30,43,0.98) 0%, rgba(13,52,72,0.98) 100%);
            box-shadow: 0 0 0 1px rgba(103,232,249,0.42), 0 0 34px rgba(34,211,238,0.24), 0 14px 28px rgba(0,0,0,.46);
        }
        .pin-card.priority .probability {
            background: rgba(103,232,249,0.22);
            color: #ecfeff;
            border: 1px solid rgba(103,232,249,0.35);
            font-weight: 800;
        }



        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background:
                radial-gradient(circle at 15% 20%, rgba(34,211,238,0.16), transparent 24%),
                radial-gradient(circle at 85% 12%, rgba(34,211,238,0.10), transparent 20%),
                radial-gradient(circle at 50% 100%, rgba(6,182,212,0.12), transparent 30%);
            filter: blur(10px);
        }
        .container {
            border: 1px solid rgba(103, 232, 249, 0.14);
            backdrop-filter: blur(10px);
        }
        h1 {
            color: #ecfeff;
            text-shadow: 0 0 18px rgba(34,211,238,0.12);
        }
        .helper-note {
            background: rgba(8, 31, 44, 0.9);
            border: 1px solid rgba(34, 211, 238, 0.18);
            color: #b6f7ff;
            box-shadow: inset 0 0 18px rgba(34,211,238,0.03);
        }
        .section-desc {
            color: #89a7b5;
        }
        .stats-grid, .section-title .badge, .probability {
            box-shadow: inset 0 0 14px rgba(34,211,238,0.03);
        }
        .pin-card::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 1rem;
            background: linear-gradient(180deg, rgba(103,232,249,0.06), transparent 38%);
            opacity: .85;
            pointer-events: none;
        }
        .pin-card .pin-code {
            font-size: 1.3rem;
            font-weight: 700;
            font-family: 'Consolas', 'Courier New', monospace;
            letter-spacing: 0.5px;
            line-height: 1.4;
            color: #dffcff;
            text-shadow: 0 0 10px rgba(103,232,249,.18);
        }
        .pin-card.priority {
            border-color: rgba(103, 232, 249, 0.95);
            background: linear-gradient(180deg, rgba(8,30,43,0.98) 0%, rgba(13,52,72,0.98) 100%);
            box-shadow: 0 0 0 1px rgba(103,232,249,0.42), 0 0 34px rgba(34,211,238,0.24), 0 14px 28px rgba(0,0,0,.46);
        }
        .pin-card.priority .pin-code {
            color: #ffffff;
            text-shadow: 0 0 22px rgba(103,232,249,.62), 0 0 8px rgba(103,232,249,.42);
        }
        .pin-card:hover:not(.tested) .pin-code {
            text-shadow: 0 0 18px rgba(103,232,249,.42), 0 0 6px rgba(103,232,249,.25);
        }
        .btn-reset {
            border: 1px solid rgba(248, 113, 113, 0.18);
            box-shadow: 0 8px 20px rgba(0,0,0,.22);
        }
</style>
</head>
<body>
<div class="container" id="app">
    <header>
        <h1>
            🔐 Control de PINES
            <span>Uso real + orden práctico</span>
        </h1>
        <div class="subtitle">
            Marca los PINes que ya probaste. La lista prioriza combinaciones humanas frecuentes: secuencias simples, repetidos, fechas probables y patrones de teclado.
        </div>
    </header>

    

    <div class="stats-grid">
        <div class="stats">
            <div class="stat-item"><span class="label">📌 Pendientes:</span><span class="value pending" id="pendingCount">0</span></div>
            <div class="stat-item"><span class="label">✅ Probados:</span><span class="value tested" id="testedCount">0</span></div>
            <div class="stat-item"><span class="label">📊 Total:</span><span class="value" id="totalCount">0</span></div>
        </div>
        <button class="btn-reset" id="resetBtn">🔄 Reiniciar todo</button>
    </div>

    <!-- Sección 4 dígitos -->
    <div class="section-title">
        <span>4 Dígitos</span>
        <span class="badge" id="badge4">0 pendientes</span>
    </div>
    
    <div class="pin-grid" id="grid4"></div>

    <!-- Sección 6 dígitos -->
    <div class="section-title">
        <span>6 Dígitos</span>
        <span class="badge" id="badge6">0 pendientes</span>
    </div>
    
    <div class="pin-grid" id="grid6"></div>

    <div class="footer">
        
        <br />
        <br /><span style="opacity:0.6;"></span>
    </div>
</div>

<script>
    (function() {
        'use strict';

        // ------------------------------------------------------------
        // LISTAS DE PINES MÁS COMUNES (ordenados de más a menos común)
        // ------------------------------------------------------------
                const PIN_4 = [
            '1234', '0000', '1111', '1212', '7777',
            '1004', '2000', '4444', '2222', '6969',
            '9999', '3333', '5555', '6666', '1122',
            '1313', '4321', '2001', '1010', '2580',
            '2586', '2589', '0852', '1998', '1984',
            '1990', '1995', '1980', '2002', '2010',
            '1818', '1717', '1616', '1515', '1414',
            '1221', '2112', '1123', '1230', '1235',
            '0101', '0202', '0303', '4545', '7878',
            '9898', '2468', '3579', '1590', '1342'
        ];

                const PIN_6 = [
            '123456', '000000', '111111', '123123', '121212',
            '654321', '222222', '333333', '444444', '555555',
            '666666', '777777', '888888', '999999', '112233',
            '123321', '111222', '222111', '123789', '987654',
            '101010', '010101', '123450', '000001', '100000',
            '147258', '258369', '159753', '321321', '123000',
            '000123', '999000', '101112', '112211', '445566',
            '010190', '010199', '311299', '200000', '199999',
            '121314', '141414', '151515', '161616', '171717',
            '181818', '191919', '202020', '212121', '232323'
        ];

        // ------------------------------------------------------------
        // Cálculo de probabilidad (basado en ranking: más común = mayor %)
        // Usamos una distribución de Pareto simplificada: peso = 1/(i+1)^0.8
        // y normalizamos para que sume 100.
        // ------------------------------------------------------------
        function computeProbabilities(list) {
            const n = list.length;
            const weights = list.map((_, i) => 1 / Math.pow(i + 1, 0.8));
            const sum = weights.reduce((a, b) => a + b, 0);
            return weights.map(w => (w / sum) * 100);
        }

        const probs4 = computeProbabilities(PIN_4);
        const probs6 = computeProbabilities(PIN_6);

        // ------------------------------------------------------------
        // ESTADO (localStorage)
        // ------------------------------------------------------------
        const STORAGE_KEY = 'pinTrackerState';
        let memoryState = null;

        function storageAvailable() {
            try {
                const key = '__pin_test__';
                localStorage.setItem(key, '1');
                localStorage.removeItem(key);
                return true;
            } catch (e) {
                return false;
            }
        }

        const CAN_USE_STORAGE = storageAvailable();

        function loadState() {
            if (CAN_USE_STORAGE) {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    try { return JSON.parse(stored); } catch (e) { return null; }
                }
            }
            return memoryState;
        }

        function saveState(state) {
            if (CAN_USE_STORAGE) {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            } else {
                memoryState = JSON.parse(JSON.stringify(state));
            }
        }

        function initState() {
            const existing = loadState();
            if (existing && typeof existing === 'object') {
                // Asegurar que existan todas las claves
                let modified = false;
                [PIN_4, PIN_6].forEach((list, idx) => {
                    const key = idx === 0 ? '4' : '6';
                    if (!existing[key]) { existing[key] = {}; modified = true; }
                    list.forEach(pin => {
                        if (!(pin in existing[key])) {
                            existing[key][pin] = false;
                            modified = true;
                        }
                    });
                });
                if (modified) saveState(existing);
                return existing;
            } else {
                const fresh = { '4': {}, '6': {} };
                PIN_4.forEach(p => fresh['4'][p] = false);
                PIN_6.forEach(p => fresh['6'][p] = false);
                saveState(fresh);
                return fresh;
            }
        }

        let state = initState();

        // ------------------------------------------------------------
        // RENDER
        // ------------------------------------------------------------
        function render() {
            renderGrid('4', PIN_4, probs4);
            renderGrid('6', PIN_6, probs6);
            updateStats();
        }

        function renderGrid(digits, list, probs) {
            const container = document.getElementById(digits === '4' ? 'grid4' : 'grid6');
            const badge = document.getElementById(digits === '4' ? 'badge4' : 'badge6');
            if (!container) return;

            const pinState = state[digits] || {};
            let pending = 0;
            list.forEach(pin => { if (!pinState[pin]) pending++; });
            badge.textContent = pending + ' pendientes';

            let html = '';
            list.forEach((pin, index) => {
                const tested = pinState[pin] || false;
                const prob = probs[index];
                const probStr = prob.toFixed(2) + '%';
                const priority = index < 10 ? ' priority' : '';
                const classes = 'pin-card' + priority + (tested ? ' tested' : '');
                html += `<div class="${classes}" data-digits="${digits}" data-pin="${pin}">
                            <div class="pin-code">${pin}</div>
                            <div class="probability">${probStr}</div>
                        </div>`;
            });
            container.innerHTML = html;

            container.querySelectorAll('.pin-card').forEach(card => {
                card.addEventListener('click', function(e) {
                    const digitsAttr = this.dataset.digits;
                    const pin = this.dataset.pin;
                    togglePin(digitsAttr, pin);
                });
            });
        }

        function togglePin(digits, pin) {
            state[digits][pin] = !state[digits][pin];
            saveState(state);
            render();
        }

        function updateStats() {
            const total4 = PIN_4.length, total6 = PIN_6.length;
            const total = total4 + total6;
            let tested4 = 0, tested6 = 0;
            PIN_4.forEach(p => { if (state['4'][p]) tested4++; });
            PIN_6.forEach(p => { if (state['6'][p]) tested6++; });
            const testedTotal = tested4 + tested6;
            const pendingTotal = total - testedTotal;

            document.getElementById('pendingCount').textContent = pendingTotal;
            document.getElementById('testedCount').textContent = testedTotal;
            document.getElementById('totalCount').textContent = total;
        }

        // ------------------------------------------------------------
        // RESET
        // ------------------------------------------------------------
        function resetAll() {
            if (!confirm('¿Marcar todos los PINs como NO probados?')) return;
            PIN_4.forEach(p => state['4'][p] = false);
            PIN_6.forEach(p => state['6'][p] = false);
            saveState(state);
            render();
        }

        // ------------------------------------------------------------
        // INICIO
        // ------------------------------------------------------------
        document.addEventListener('DOMContentLoaded', function() {
            render();
            document.getElementById('resetBtn').addEventListener('click', resetAll);
        });

        window.addEventListener('beforeunload', function() {
            saveState(state);
        });
    })();
</script>
</body>
</html>
